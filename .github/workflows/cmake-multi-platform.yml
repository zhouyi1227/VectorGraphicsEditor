name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows / MSYS2 UCRT64 / Qt 6 / Debug
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-clang-tools-extra

      - name: Diagnose toolchain
        run: |
          echo "MSYSTEM=$MSYSTEM"
          echo "MINGW_PREFIX=$MINGW_PREFIX"
          which g++
          g++ --version
          which cmake
          cmake --version
          which ninja
          ninja --version

      - name: Configure
        run: >
          cmake -S . -B out/build/windows-ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_PREFIX_PATH="$MINGW_PREFIX"
          -DBUILD_TESTING=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF

      - name: Format check
        run: cmake --build out/build/windows-ci --target format-check

      - name: Build
        run: cmake --build out/build/windows-ci

      - name: Test
        run: ctest --test-dir out/build/windows-ci --output-on-failure
