name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  # ======================================================================
  #  Resolve the tag (manual dispatch or tag push)
  # ======================================================================
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

  # ======================================================================
  #  Windows AMD64 — portable ZIP + NSIS installer
  # ======================================================================
  windows-amd64:
    name: Windows AMD64
    needs: resolve-tag
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v7

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-nsis

      - name: Build Release
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_PREFIX_PATH="$MINGW_PREFIX"
          -DBUILD_TESTING=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF
          -DAPP_VERSION="${VERSION}"
          &&
          cmake --build build
          &&
          ctest --test-dir build --output-on-failure

      - name: Stage portable (windeployqt)
        run: |
          mkdir -p dist/portable
          EXE="$(find build -name VectorGraphicsEditor.exe -type f | head -1)"
          cp "$EXE" dist/portable/
          DEPLOYQT="$(which windeployqt 2>/dev/null || which windeployqt6)"
          "$DEPLOYQT" --release --compiler-runtime --dir dist/portable dist/portable/VectorGraphicsEditor.exe
          find dist/portable -type f \( -name '*.exe' -o -name '*.dll' \) | while read -r binary; do
            ldd "$binary" | awk '
              $3 ~ /\.dll$/ { print $3 }
              $1 ~ /^\// && $1 ~ /\.dll$/ { print $1 }
            ' | while read -r dll; do
              case "$dll" in
                "$MINGW_PREFIX"/bin/*) cp -f "$dll" dist/portable/ ;;
              esac
            done
          done

      - name: Smoke test portable bundle
        shell: pwsh
        run: |
          $exe = (Resolve-Path 'dist/portable/VectorGraphicsEditor.exe').Path
          $env:QT_QPA_PLATFORM = 'windows'
          $proc = Start-Process -FilePath $exe -WorkingDirectory (Split-Path $exe) -WindowStyle Hidden -PassThru
          try {
            Start-Sleep -Seconds 5
            if ($proc.HasExited) {
              throw "Portable bundle exited early with code $($proc.ExitCode)."
            }
          }
          finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
            Wait-Process -Id $proc.Id -ErrorAction SilentlyContinue
          }

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/portable/* `
            -DestinationPath "dist/VectorGraphicsEditor-$env:VERSION-windows-amd64.zip" `
            -Force

      - name: Package NSIS installer
        run: |
          cp packaging/windows/installer.nsi dist/portable/
          cd dist/portable
          makensis -V4 -DAPP_VERSION="${VERSION}" \
            -DOUTFILE="VectorGraphicsEditor-${VERSION}-windows-amd64-setup.exe" \
            installer.nsi
          mv "VectorGraphicsEditor-${VERSION}-windows-amd64-setup.exe" ..

      - name: Smoke test NSIS installer
        shell: pwsh
        run: |
          $installer = (Resolve-Path "dist/VectorGraphicsEditor-$env:VERSION-windows-amd64-setup.exe").Path
          $installRoot = Join-Path $env:RUNNER_TEMP 'VectorGraphicsEditor-smoke-amd64'
          Remove-Item $installRoot -Recurse -Force -ErrorAction SilentlyContinue

          $install = Start-Process -FilePath $installer -ArgumentList '/S', "/D=$installRoot" -WindowStyle Hidden -PassThru -Wait
          if ($install.ExitCode -ne 0) {
            throw "Installer exited with code $($install.ExitCode)."
          }

          $exe = Join-Path $installRoot 'VectorGraphicsEditor.exe'
          if (-not (Test-Path $exe)) {
            throw "Installed executable not found at $exe."
          }

          $env:QT_QPA_PLATFORM = 'windows'
          $proc = Start-Process -FilePath $exe -WorkingDirectory $installRoot -WindowStyle Hidden -PassThru
          try {
            Start-Sleep -Seconds 5
            if ($proc.HasExited) {
              throw "Installed app exited early with code $($proc.ExitCode)."
            }
          }
          finally {
            if (-not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            }
            Wait-Process -Id $proc.Id -ErrorAction SilentlyContinue
            Remove-Item $installRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

      - uses: actions/upload-artifact@v7
        with:
          name: windows-amd64
          path: |
            dist/VectorGraphicsEditor-*-windows-amd64.zip
            dist/VectorGraphicsEditor-*-windows-amd64-setup.exe
          if-no-files-found: error

  # ======================================================================
  #  macOS Apple Silicon (ARM64)
  # ======================================================================
  macos-arm64:
    name: macOS Apple Silicon
    needs: resolve-tag
    runs-on: macos-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          rm -rf /opt/homebrew/Library/Taps/aws 2>/dev/null || true
          brew install qt cmake ninja create-dmg

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Deploy Qt app bundle
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          APP="$(find build -name VectorGraphicsEditor.app -type d | head -1)"
          QT_DIR="$(brew --prefix qt)"
          MACDEPLOYQT="$QT_DIR/bin/macdeployqt"
          "$MACDEPLOYQT" "$APP" -verbose=2
          find "$APP/Contents" -name '*.h' -delete 2>/dev/null || true

      - name: Verify deployed Qt references
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          APP="$(find build -name VectorGraphicsEditor.app -type d | head -1)"
          QT_DIR="$(brew --prefix qt)"
          MAIN_BIN="$APP/Contents/MacOS/VectorGraphicsEditor"
          PLATFORM_PLUGIN="$APP/Contents/PlugIns/platforms/libqcocoa.dylib"
          otool -L "$MAIN_BIN"
          otool -L "$PLATFORM_PLUGIN"
          if otool -L "$MAIN_BIN" "$PLATFORM_PLUGIN" | grep -F "$QT_DIR" >/dev/null; then
            echo "ERROR: App bundle still references Homebrew Qt paths."
            exit 1
          fi

      - name: Smoke test app bundle
        run: |
          APP="$(find build -name VectorGraphicsEditor.app -type d | head -1)"
          LOG_FILE="$(mktemp)"
          export QT_QPA_PLATFORM=cocoa
          "$APP/Contents/MacOS/VectorGraphicsEditor" >"$LOG_FILE" 2>&1 &
          APP_PID=$!
          sleep 5
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            cat "$LOG_FILE"
            wait "$APP_PID"
            exit 1
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - name: Create DMG
        run: |
          APP="$(find build -name VectorGraphicsEditor.app -type d | head -1)"
          STAGING_DIR="$PWD/dist/dmg-root"
          DMG="VectorGraphicsEditor-${VERSION}-macos-arm64.dmg"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP" "$STAGING_DIR/"
          create-dmg \
            --volname "VectorGraphicsEditor" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VectorGraphicsEditor.app" 150 190 \
            --hide-extension "VectorGraphicsEditor.app" \
            --app-drop-link 450 190 \
            "$DMG" "$STAGING_DIR"

      - name: Verify DMG contents
        run: |
          DMG="VectorGraphicsEditor-${VERSION}-macos-arm64.dmg"
          MOUNT_DIR="$(mktemp -d)"
          trap 'hdiutil detach "$MOUNT_DIR" >/dev/null 2>&1 || true' EXIT
          hdiutil attach "$DMG" -mountpoint "$MOUNT_DIR" -nobrowse
          APP_ROOT="$MOUNT_DIR/VectorGraphicsEditor.app"
          test -d "$APP_ROOT"
          test -d "$APP_ROOT/Contents/Frameworks/QtCore.framework"
          test -d "$APP_ROOT/Contents/Frameworks/QtGui.framework"
          test -d "$APP_ROOT/Contents/Frameworks/QtWidgets.framework"
          test -f "$APP_ROOT/Contents/Info.plist"
          trap - EXIT
          hdiutil detach "$MOUNT_DIR"

      - uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: VectorGraphicsEditor-*-macos-arm64.dmg
          if-no-files-found: error

  # ======================================================================
  #  Linux — Debian/Ubuntu (.deb)
  # ======================================================================
  linux-deb:
    name: Linux Debian (.deb)
    needs: resolve-tag
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build qt6-base-dev dpkg-dev file

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Create .deb package
        run: |
          cd build
          cpack -G DEB \
            -D APP_VERSION="${VERSION}" \
            -D CPACK_DEBIAN_PACKAGE_MAINTAINER="CourseProject" \
            -D CPACK_PACKAGE_FILE_NAME="VectorGraphicsEditor-${VERSION}-linux-amd64"

      - name: Inspect .deb metadata
        run: |
          DEB_FILE="$(find build -maxdepth 1 -name 'VectorGraphicsEditor-*.deb' -type f | head -1)"
          dpkg-deb -I "$DEB_FILE"
          dpkg-deb -f "$DEB_FILE" Depends

      - name: Smoke test .deb in clean container
        run: |
          DEB_FILE="$(basename "$(find build -maxdepth 1 -name 'VectorGraphicsEditor-*.deb' -type f | head -1)")"
          docker run --rm -v "$PWD/build:/artifacts:ro" ubuntu:24.04 bash -lc "
            set -euo pipefail
            apt-get update
            apt-get install -y /artifacts/$DEB_FILE
            QT_QPA_PLATFORM=offscreen /usr/VectorGraphicsEditor >/tmp/vector-graphics-editor.log 2>&1 &
            APP_PID=\$!
            sleep 5
            if ! kill -0 \$APP_PID 2>/dev/null; then
              cat /tmp/vector-graphics-editor.log
              wait \$APP_PID
              exit 1
            fi
            kill \$APP_PID 2>/dev/null || true
            wait \$APP_PID || true
          "

      - uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: build/VectorGraphicsEditor-*.deb
          if-no-files-found: error

  # ======================================================================
  #  Linux — Fedora / RHEL (.rpm)
  # ======================================================================
  linux-rpm:
    name: Linux Red Hat (.rpm)
    needs: resolve-tag
    runs-on: ubuntu-latest
    container: fedora:latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          dnf install -y git cmake ninja-build gcc-c++ qt6-qtbase-devel rpm-build

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Create .rpm package
        run: |
          cd build
          cpack -G RPM \
            -D APP_VERSION="${VERSION}" \
            -D CPACK_RPM_PACKAGE_LICENSE="MIT" \
            -D CPACK_PACKAGE_FILE_NAME="VectorGraphicsEditor-${VERSION}-linux-amd64"

      - name: Inspect .rpm metadata
        run: |
          RPM_FILE="$(find build -maxdepth 1 -name 'VectorGraphicsEditor-*.rpm' -type f | head -1)"
          rpm -qip "$RPM_FILE"
          rpm -qpR "$RPM_FILE"

      - name: Smoke test .rpm in clean installroot
        run: |
          RPM_FILE="$(find build -maxdepth 1 -name 'VectorGraphicsEditor-*.rpm' -type f | head -1)"
          VERIFY_ROOT="$PWD/rpm-smoke-root"
          rm -rf "$VERIFY_ROOT"
          mkdir -p "$VERIFY_ROOT"
          dnf --version
          dnf repolist
          dnf install -y \
            --nogpgcheck \
            --use-host-config \
            --installroot "$VERIFY_ROOT" \
            --releasever "$(rpm -E %fedora)" \
            --setopt=install_weak_deps=False \
            "$RPM_FILE"
          test -x "$VERIFY_ROOT/usr/VectorGraphicsEditor"
          QT_QPA_PLATFORM=offscreen chroot "$VERIFY_ROOT" /usr/VectorGraphicsEditor >/tmp/vector-graphics-editor-rpm.log 2>&1 &
          APP_PID=$!
          sleep 5
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            cat /tmp/vector-graphics-editor-rpm.log
            wait "$APP_PID"
            exit 1
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - uses: actions/upload-artifact@v7
        with:
          name: linux-rpm
          path: build/VectorGraphicsEditor-*.rpm
          if-no-files-found: error

  # ======================================================================
  #  Linux — Arch (tar.zst)
  # ======================================================================
  linux-arch:
    name: Linux Arch (tar.zst)
    needs: resolve-tag
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --noprogressbar || true
          pacman -S --noconfirm --noprogressbar git cmake ninja gcc qt6-base zstd

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Create Arch install tree archive
        run: |
          DESTDIR="$PWD/pkg" cmake --install build
          cd pkg
          tar -caf "../VectorGraphicsEditor-${VERSION}-linux-amd64.tar.zst" \
            --zstd \
            --owner=0 --group=0 \
            .

      - name: Smoke test Arch install tree
        run: |
          ARCHIVE_FILE="$(find . -maxdepth 1 -name 'VectorGraphicsEditor-*-linux-amd64.tar.zst' -type f | head -1)"
          VERIFY_ROOT="$PWD/arch-smoke-root"
          rm -rf "$VERIFY_ROOT"
          mkdir -p "$VERIFY_ROOT"
          tar -xaf "$ARCHIVE_FILE" -C "$VERIFY_ROOT"
          QT_QPA_PLATFORM=offscreen "$VERIFY_ROOT/usr/VectorGraphicsEditor" >/tmp/vector-graphics-editor-arch.log 2>&1 &
          APP_PID=$!
          sleep 5
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            cat /tmp/vector-graphics-editor-arch.log
            wait "$APP_PID"
            exit 1
          fi
          kill "$APP_PID" 2>/dev/null || true
          wait "$APP_PID" || true

      - uses: actions/upload-artifact@v7
        with:
          name: linux-arch
          path: VectorGraphicsEditor-*-linux-amd64.tar.zst
          if-no-files-found: error

  # ======================================================================
  #  Create GitHub Release with all artifacts
  # ======================================================================
  github-release:
    name: Create GitHub Release
    needs:
      - resolve-tag
      - windows-amd64
      - macos-arm64
      - linux-deb
      - linux-rpm
      - linux-arch
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: VectorGraphicsEditor ${{ env.TAG }}
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
          files: artifacts/*
          fail_on_unmatched_files: true
