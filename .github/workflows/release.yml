name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  # ======================================================================
  #  Resolve the tag (manual dispatch or tag push)
  # ======================================================================
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION"

  # ======================================================================
  #  Windows AMD64 — portable ZIP + NSIS installer
  # ======================================================================
  windows-amd64:
    name: Windows AMD64
    needs: resolve-tag
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-nsis

      - name: Build Release
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_PREFIX_PATH="$MINGW_PREFIX"
          -DBUILD_TESTING=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF
          -DAPP_VERSION="${VERSION}"
          &&
          cmake --build build
          &&
          ctest --test-dir build --output-on-failure

      - name: Stage portable (windeployqt)
        run: |
          mkdir -p dist/portable
          EXE="$(find build -name VectorGraphicsEditor.exe -type f | head -1)"
          cp "$EXE" dist/portable/
          DEPLOYQT="$(which windeployqt 2>/dev/null || which windeployqt6)"
          "$DEPLOYQT" --release --compiler-runtime --dir dist/portable dist/portable/VectorGraphicsEditor.exe
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            [ -f "$MINGW_PREFIX/bin/$dll" ] && cp "$MINGW_PREFIX/bin/$dll" dist/portable/
          done

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/portable/* `
            -DestinationPath "dist/VectorGraphicsEditor-$env:VERSION-windows-amd64.zip" `
            -Force

      - name: Package NSIS installer
        run: |
          cp packaging/windows/installer.nsi dist/portable/
          cd dist/portable
          makensis -V4 -DAPP_VERSION="${VERSION}" \
            -DOUTFILE="VectorGraphicsEditor-${VERSION}-windows-amd64-setup.exe" \
            installer.nsi
          mv "VectorGraphicsEditor-${VERSION}-windows-amd64-setup.exe" ..

      - uses: actions/upload-artifact@v6
        with:
          name: windows-amd64
          path: |
            dist/VectorGraphicsEditor-*-windows-amd64.zip
            dist/VectorGraphicsEditor-*-windows-amd64-setup.exe
          if-no-files-found: error

  # ======================================================================
  #  Windows ARM64 — portable ZIP only
  # ======================================================================
  windows-arm64:
    name: Windows ARM64
    needs: resolve-tag
    runs-on: windows-11-arm
    defaults:
      run:
        shell: msys2 {0}
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2 CLANGARM64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            mingw-w64-clang-aarch64-clang
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-ninja
            mingw-w64-clang-aarch64-qt6-base

      - name: Build Release
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=clang++
          -DCMAKE_PREFIX_PATH="$MINGW_PREFIX"
          -DBUILD_TESTING=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF
          -DAPP_VERSION="${VERSION}"
          &&
          cmake --build build
          &&
          ctest --test-dir build --output-on-failure

      - name: Stage portable (windeployqt)
        run: |
          mkdir -p dist/portable
          EXE="$(find build -name VectorGraphicsEditor.exe -type f | head -1)"
          cp "$EXE" dist/portable/
          DEPLOYQT="$(which windeployqt 2>/dev/null || which windeployqt6)"
          "$DEPLOYQT" --release --compiler-runtime --dir dist/portable dist/portable/VectorGraphicsEditor.exe
          for dll in libc++.dll libunwind.dll; do
            [ -f "$MINGW_PREFIX/bin/$dll" ] && cp "$MINGW_PREFIX/bin/$dll" dist/portable/
          done

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/portable/* `
            -DestinationPath "dist/VectorGraphicsEditor-$env:VERSION-windows-arm64.zip" `
            -Force

      - uses: actions/upload-artifact@v6
        with:
          name: windows-arm64
          path: dist/VectorGraphicsEditor-*-windows-arm64.zip
          if-no-files-found: error

  # ======================================================================
  #  macOS Apple Silicon (ARM64)
  # ======================================================================
  macos-arm64:
    name: macOS Apple Silicon
    needs: resolve-tag
    runs-on: macos-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen
      HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          rm -rf /opt/homebrew/Library/Taps/aws 2>/dev/null || true
          brew install qt cmake ninja create-dmg

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt)" \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Deploy Qt frameworks
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
        run: |
          APP="$(find build -name VectorGraphicsEditor.app -type d | head -1)"
          QT_DIR="$(brew --prefix qt)"
          if [ -z "$QT_DIR" ] || [ ! -d "$QT_DIR" ]; then
            echo "ERROR: Could not determine Qt prefix. brew --prefix qt returned: '$QT_DIR'"
            exit 1
          fi
          # Create Frameworks dir and copy Qt libraries manually
          mkdir -p "$APP/Contents/Frameworks"
          for lib in QtCore QtGui QtWidgets QtDBus; do
            if [ -f "$QT_DIR/lib/${lib}.framework/${lib}" ]; then
              cp -R "$QT_DIR/lib/${lib}.framework" "$APP/Contents/Frameworks/"
            elif [ -f "$QT_DIR/lib/lib${lib}.dylib" ]; then
              cp "$QT_DIR/lib/lib${lib}.dylib" "$APP/Contents/Frameworks/"
              install_name_tool -change "$QT_DIR/lib/lib${lib}.dylib" \
                "@executable_path/../Frameworks/lib${lib}.dylib" \
                "$APP/Contents/MacOS/VectorGraphicsEditor"
            fi
          done
          # Copy platform plugin
          mkdir -p "$APP/Contents/PlugIns/platforms"
          cp "$QT_DIR/plugins/platforms/libqcocoa.dylib" "$APP/Contents/PlugIns/platforms/" 2>/dev/null || true
          # Install name fix for the main binary
          install_name_tool -add_rpath "@executable_path/../Frameworks" \
            "$APP/Contents/MacOS/VectorGraphicsEditor" 2>/dev/null || true
          find "$APP/Contents" -name '*.h' -delete 2>/dev/null || true

      - name: Create DMG
        run: |
          APP="$(find build -name VectorGraphicsEditor.app -type d | head -1)"
          DMG="VectorGraphicsEditor-${VERSION}-macos-arm64.dmg"
          create-dmg \
            --volname "VectorGraphicsEditor" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "VectorGraphicsEditor.app" 150 190 \
            --hide-extension "VectorGraphicsEditor.app" \
            --app-drop-link 450 190 \
            "$DMG" "$APP"

      - uses: actions/upload-artifact@v6
        with:
          name: macos-arm64
          path: VectorGraphicsEditor-*-macos-arm64.dmg
          if-no-files-found: error

  # ======================================================================
  #  Linux — Debian/Ubuntu (.deb)
  # ======================================================================
  linux-deb:
    name: Linux Debian (.deb)
    needs: resolve-tag
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build qt6-base-dev

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Create .deb package
        run: |
          cd build
          cpack -G DEB \
            -D APP_VERSION="${VERSION}" \
            -D CPACK_DEBIAN_PACKAGE_MAINTAINER="CourseProject" \
            -D CPACK_PACKAGE_FILE_NAME="VectorGraphicsEditor-${VERSION}-linux-amd64"

      - uses: actions/upload-artifact@v6
        with:
          name: linux-deb
          path: build/VectorGraphicsEditor-*.deb
          if-no-files-found: error

  # ======================================================================
  #  Linux — Fedora / RHEL (.rpm)
  # ======================================================================
  linux-rpm:
    name: Linux Red Hat (.rpm)
    needs: resolve-tag
    runs-on: ubuntu-latest
    container: fedora:latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          dnf install -y git cmake ninja-build gcc-c++ qt6-qtbase-devel rpm-build

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Create .rpm package
        run: |
          cd build
          cpack -G RPM \
            -D APP_VERSION="${VERSION}" \
            -D CPACK_RPM_PACKAGE_LICENSE="MIT" \
            -D CPACK_PACKAGE_FILE_NAME="VectorGraphicsEditor-${VERSION}-linux-amd64"

      - uses: actions/upload-artifact@v6
        with:
          name: linux-rpm
          path: build/VectorGraphicsEditor-*.rpm
          if-no-files-found: error

  # ======================================================================
  #  Linux — Arch (.pkg.tar.zst)
  # ======================================================================
  linux-arch:
    name: Linux Arch (.pkg.tar.zst)
    needs: resolve-tag
    runs-on: ubuntu-latest
    container: archlinux:latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}
      VERSION: ${{ needs.resolve-tag.outputs.version }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --noprogressbar || true
          pacman -S --noconfirm --noprogressbar git cmake ninja gcc qt6-base zstd

      - name: Build Release
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_TESTING=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON \
            -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF \
            -DAPP_VERSION="${VERSION}"
          cmake --build build
          ctest --test-dir build --output-on-failure

      - name: Create Arch package (tar.zst)
        run: |
          DESTDIR="$PWD/pkg" cmake --install build
          cd pkg
          tar -caf "../VectorGraphicsEditor-${VERSION}-linux-amd64.pkg.tar.zst" \
            --zstd \
            --owner=0 --group=0 \
            .

      - uses: actions/upload-artifact@v6
        with:
          name: linux-arch
          path: VectorGraphicsEditor-*-linux-amd64.pkg.tar.zst
          if-no-files-found: error

  # ======================================================================
  #  Create GitHub Release with all artifacts
  # ======================================================================
  github-release:
    name: Create GitHub Release
    needs:
      - resolve-tag
      - windows-amd64
      - windows-arm64
      - macos-arm64
      - linux-deb
      - linux-rpm
      - linux-arch
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve-tag.outputs.tag }}

    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: VectorGraphicsEditor ${{ env.TAG }}
          draft: false
          prerelease: ${{ contains(env.TAG, '-') }}
          files: artifacts/*
          fail_on_unmatched_files: true
