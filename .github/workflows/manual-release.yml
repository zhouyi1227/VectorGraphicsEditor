name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: manual-release-${{ inputs.version }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Setup MSYS2 UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-clang-tools-extra

      - name: Diagnose toolchain
        run: |
          echo "MSYSTEM=$MSYSTEM"
          echo "MINGW_PREFIX=$MINGW_PREFIX"
          g++ --version
          cmake --version
          ninja --version

      - name: Configure Release build
        run: >
          cmake -S . -B out/build/release -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER=g++
          -DCMAKE_PREFIX_PATH="$MINGW_PREFIX"
          -DBUILD_TESTING=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_WARNINGS=ON
          -DVECTOR_GRAPHICS_EDITOR_ENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build out/build/release

      - name: Run tests
        run: ctest --test-dir out/build/release --output-on-failure

      - name: Stage application and dependencies
        run: |
          mkdir -p dist/VectorGraphicsEditor

          EXE_PATH="$(find out/build/release -name 'VectorGraphicsEditor.exe' -type f | head -n 1)"
          if [ -z "$EXE_PATH" ]; then
            echo "VectorGraphicsEditor.exe not found."
            find out/build/release -maxdepth 4 -type f
            exit 1
          fi

          echo "Found executable: $EXE_PATH"
          cp "$EXE_PATH" dist/VectorGraphicsEditor/

          if command -v windeployqt >/dev/null 2>&1; then
            DEPLOYQT=windeployqt
          elif command -v windeployqt6 >/dev/null 2>&1; then
            DEPLOYQT=windeployqt6
          else
            echo "windeployqt not found."
            exit 1
          fi

          "$DEPLOYQT" --release --compiler-runtime --dir dist/VectorGraphicsEditor dist/VectorGraphicsEditor/VectorGraphicsEditor.exe

          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            if [ -f "$MINGW_PREFIX/bin/$dll" ]; then
              cp "$MINGW_PREFIX/bin/$dll" dist/VectorGraphicsEditor/
            fi
          done

          cp README.md dist/VectorGraphicsEditor/ || true
          cp LICENSE dist/VectorGraphicsEditor/ || true

      - name: Create ZIP package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist/VectorGraphicsEditor `
            -DestinationPath dist/VectorGraphicsEditor-windows-ucrt64-${{ inputs.version }}.zip `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VectorGraphicsEditor-windows-ucrt64-${{ inputs.version }}
          path: dist/VectorGraphicsEditor-windows-ucrt64-${{ inputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: VectorGraphicsEditor ${{ inputs.version }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/VectorGraphicsEditor-windows-ucrt64-${{ inputs.version }}.zip
